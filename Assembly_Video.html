<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>국회 발언영상 검색</title>
    <style>
        :root { --main: #0b355e; --bg: #f2f4f7; --border: #e0e4e8; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); color: #333; }

        /* 상단 고정 영역 */
        .header-container { position: sticky; top: 0; z-index: 100; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .header-title { background: var(--main); color: white; padding: 12px; text-align: center; font-size: 16px; font-weight: bold; }
        
        .search-form { padding: 12px; display: flex; flex-direction: column; gap: 8px; max-width: 800px; margin: 0 auto; }
        .row-group { display: flex; gap: 5px; }
        select, input { flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: 4px; font-size: 14px; outline: none; }
        input { flex: 2; }
        
        .btn-search { width: 100%; padding: 12px; background: var(--main); color: white; border: none; border-radius: 4px; font-weight: bold; font-size: 15px; cursor: pointer; }

        /* 간결한 리스트 디자인 */
        #results { max-width: 800px; margin: 0 auto; padding: 10px; }
        .speech-item { 
            background: white; border-bottom: 1px solid #eee; padding: 15px 10px; 
            display: flex; align-items: center; justify-content: space-between; cursor: pointer;
        }
        .speech-item:active { background: #f0f4f8; }
        .info-wrap { display: flex; flex-direction: column; overflow: hidden; flex: 1; margin-right: 10px; }
        .info-top { font-size: 11px; color: #888; margin-bottom: 4px; }
        .info-title { font-size: 14px; font-weight: 500; color: #222; line-height: 1.4; word-break: keep-all; }
        .play-icon { color: var(--main); font-size: 18px; flex-shrink: 0; opacity: 0.7; }

        .empty-state { text-align: center; padding: 80px 20px; color: #999; font-size: 14px; }
    </style>
</head>
<body>

<div class="header-container">
    <div class="header-title">국회 발언영상 검색</div>
    <div class="search-form">
        <div class="row-group">
            <select id="sel_ct1"></select>
            <select id="sel_year"></select>
        </div>
        <input type="text" id="ipt_speaker" placeholder="성함 입력 (예: 홍길동)" onkeypress="if(event.keyCode==13) doSearch();">
        <button class="btn-search" onclick="doSearch()">검색하기</button>
    </div>
</div>

<div id="results">
    <div class="empty-state">국회의원 성함을 입력하여 영상을 검색하세요.</div>
</div>

<script>
    // 초기 설정 (대수 및 연도 초기화)
    const ct1Arr = document.getElementById('sel_ct1');
    const yearArr = document.getElementById('sel_year');

    // 22대~18대 설정
    for(let i=22; i>=18; i--) ct1Arr.add(new Option(`${i}대`, i));
    
    // 현재 연도 기준으로 연도 리스트 생성
    const currentYear = new Date().getFullYear();
    for(let y=currentYear; y>=2000; y--) {
        let opt = new Option(`${y}년`, y);
        if(y === currentYear) opt.selected = true;
        yearArr.add(opt);
    }

    async function doSearch() {
        const key = 'b44305f390624eabbd46f3bba38eede8';
        const ct1 = ct1Arr.value;
        const year = yearArr.value;
        const name = document.getElementById('ipt_speaker').value.trim();
        const resDiv = document.getElementById('results');

        if(!name) { 
            alert("성함을 입력해 주세요."); 
            return; 
        }

        resDiv.innerHTML = "<div class='empty-state'>데이터를 불러오는 중입니다...</div>";

        // 국회 OpenAPI 호출 URL
        const url = `https://open.assembly.go.kr/portal/openapi/npeslxqbanwkimebr?KEY=${key}&Type=json&pIndex=1&pSize=100&CT1=${ct1}&TAKING_DATE=${year}&ESSENTIAL_PERSON=${encodeURIComponent(name)}`;

        try {
            const response = await fetch(url);
            const data = await response.json();
            
            if (!data.npeslxqbanwkimebr) {
                resDiv.innerHTML = "<div class='empty-state'>검색 결과가 없습니다.<br>연도나 대수를 확인해 보세요.</div>";
                return;
            }

            const rows = data.npeslxqbanwkimebr[1].row;
            resDiv.innerHTML = "";

            rows.forEach(row => {
                const item = document.createElement('div');
                item.className = 'speech-item';
                
                // 모바일 최적화: 클릭 시 새 창으로 영상 페이지 열기
                item.onclick = () => {
                    if(row.LINK_URL) {
                        window.open(row.LINK_URL, '_blank');
                    } else {
                        alert("영상 링크가 제공되지 않는 항목입니다.");
                    }
                };
                
                // 발언자 이름 깔끔하게 정리 (슬래시 이후 제거)
                const speaker = row.ESSENTIAL_PERSON.split('/')[0].trim();
                
                item.innerHTML = `
                    <div class="info-wrap">
                        <div class="info-top">${row.TAKING_DATE} | ${speaker} | ${row.MEETING_NAME || ''}</div>
                        <div class="info-title">${row.TITLE}</div>
                    </div>
                    <div class="play-icon">▶</div>
                `;
                resDiv.appendChild(item);
            });
        } catch (e) {
            console.error(e);
            resDiv.innerHTML = "<div class='empty-state'>데이터 통신 중 오류가 발생했습니다.</div>";
        }
    }
</script>
</body>
</html>
