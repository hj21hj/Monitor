<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제22대 국회 의원실 검색</title>
    <style>
        :root { --primary: #003478; --accent: #0056b3; --bg: #f8f9fa; --border: #dee2e6; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); margin: 0; padding: 10px; color: #333; line-height: 1.5; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        header { border-bottom: 2px solid var(--primary); margin-bottom: 20px; padding-bottom: 10px; }
        h1 { color: var(--primary); font-size: 20px; margin: 0; text-align: center; }

        /* 검색 영역 반응형 */
        .search-area { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; padding: 15px; background: #f1f3f5; border-radius: 8px; }
        .search-row { display: flex; gap: 8px; flex-wrap: wrap; }
        select, input { padding: 12px; border: 1px solid #ced4da; border-radius: 6px; font-size: 15px; width: 100%; box-sizing: border-box; }
        
        /* PC에서는 가로 배치 */
        @media (min-width: 768px) {
            h1 { text-align: left; font-size: 24px; }
            .search-row { flex-wrap: nowrap; }
            #committeeSelect { width: 250px; }
            button { width: 120px; }
        }

        button { padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        button:hover { background: var(--accent); }

        /* 정렬 영역 */
        .list-header { display: flex; justify-content: flex-end; align-items: center; margin-bottom: 10px; gap: 8px; }
        .sort-select-small { padding: 6px 10px; font-size: 13px; width: auto; min-width: 150px; height: 35px; border: 1px solid var(--border); border-radius: 4px; }

        /* 테이블 반응형: 모바일에서는 테이블 숨기고 카드형 노출 */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; display: none; } /* 기본 숨김 */
        th { background: #e9ecef; padding: 12px; border-bottom: 2px solid var(--border); text-align: left; white-space: nowrap; }
        td { padding: 12px; border-bottom: 1px solid #eee; }

        /* 모바일 카드 레이아웃 */
        .member-cards { display: grid; gap: 15px; }
        .card { border: 1px solid var(--border); border-radius: 8px; padding: 15px; background: white; position: relative; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .card-name { font-size: 18px; font-weight: bold; color: var(--primary); cursor: pointer; text-decoration: underline; }
        .card-party { font-size: 12px; background: #eee; padding: 2px 6px; border-radius: 4px; }
        .card-body p { margin: 5px 0; font-size: 14px; color: #555; }
        .card-body b { color: #333; width: 80px; display: inline-block; }

        /* PC 화면 설정 (768px 이상) */
        @media (min-width: 768px) {
            table { display: table; }
            .member-cards { display: none; }
        }

        .name-link { color: var(--primary); font-weight: 700; cursor: pointer; text-decoration: underline; }
        
        /* 모달 반응형 */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); overflow-y: auto; }
        .modal-content { background: white; margin: 20px auto; width: 90%; max-width: 600px; border-radius: 12px; overflow: hidden; }
        .modal-header { background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h2 { font-size: 18px; margin: 0; }
        .close-btn { font-size: 28px; color: white; cursor: pointer; background: none; border: none; }
        
        .detail-table { width: 100%; border-collapse: collapse; }
        .detail-table th { background: #f8f9fa; width: 35%; padding: 10px 15px; font-size: 13px; color: #666; border-bottom: 1px solid #eee; text-align: left; }
        .detail-table td { padding: 10px 15px; font-size: 14px; border-bottom: 1px solid #eee; word-break: break-all; }
        
        .loading { text-align: center; padding: 50px; display: none; font-size: 16px; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🏛️ 제22대 국회 의원실 검색</h1>
    </header>

    <div class="search-area">
        <div class="search-row">
            <select id="committeeSelect" onchange="handleFilter()">
                <option value="" selected>전체 위원회</option>
                <option value="문화체육관광위원회">문화체육관광위원회</option>
                <option value="과학기술정보방송통신위원회">과학기술정보방송통신위원회</option>
                <option value="교육위원회">교육위원회</option>
                <option value="국방위원회">국방위원회</option>
                <option value="국회운영위원회">국회운영위원회</option>
                <option value="기획재정위원회">기획재정위원회</option>
                <option value="농림축산식품해양수산위원회">농림축산식품해양수산위원회</option>
                <option value="법제사법위원회">법제사법위원회</option>
                <option value="보건복지위원회">보건복지위원회</option>
                <option value="산업통상자원중소벤처기업위원회">산업통상자원중소벤처기업위원회</option>
                <option value="여성가족위원회">여성가족위원회</option>
                <option value="예산결산특별위원회">예산결산특별위원회</option>
                <option value="외교통일위원회">외교통일위원회</option>
                <option value="윤리특별위원회">윤리특별위원회</option>
                <option value="정무위원회">정무위원회</option>
                <option value="정보위원회">정보위원회</option>
                <option value="행정안전위원회">행정안전위원회</option>
                <option value="환경노동위원회">환경노동위원회</option>
            </select>
            <input type="text" id="unifiedSearch" placeholder="의원명, 보좌진 이름 입력" onkeyup="if(window.event.keyCode==13){handleFilter()}">
            <button onclick="handleFilter()">검색</button>
        </div>
    </div>

    <div class="list-header">
        <select id="sortSelect" class="sort-select-small" onchange="handleFilter()">
            <option value="NAME_ASC">이름 가나다순</option>
            <option value="ROOM_ASC">사무실 호실 (↑)</option>
            <option value="ROOM_DESC">사무실 호실 (↓)</option>
            <option value="UNITS_DESC">다선순</option>
        </select>
    </div>

    <div id="loading" class="loading">📡 데이터를 동기화 중입니다...</div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>성명</th>
                    <th>정당</th>
                    <th>지역구</th>
                    <th>위원회</th>
                    <th>전화번호</th>
                    <th>보좌관</th>
                    <th>상세</th>
                </tr>
            </thead>
            <tbody id="memberTableBody"></tbody>
        </table>
    </div>

    <div id="memberCardList" class="member-cards"></div>
</div>

<div id="detailModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>의원실 상세 정보</h2>
            <button class="close-btn" onclick="closeModal()">×</button>
        </div>
        <table class="detail-table" id="detailContent"></table>
        <div style="padding: 15px; text-align: center;">
            <button onclick="closeModal()" style="background: #666; width: auto; padding: 10px 40px;">닫기</button>
        </div>
    </div>
</div>

<script>
    const API_KEY = '4fbc27e65852496ab48087bcb355321a';
    const ENDPOINT = 'https://open.assembly.go.kr/portal/openapi/nwvrqwxyaytdsfvhu';
    let allMembers = [];

    window.onload = () => fetchAllAssemblyData();

    async function fetchAllAssemblyData() {
        document.getElementById('loading').style.display = 'block';
        try {
            const response = await fetch(`${ENDPOINT}?KEY=${API_KEY}&Type=json&pIndex=1&pSize=500`);
            const data = await response.json();
            if (data.nwvrqwxyaytdsfvhu) {
                allMembers = data.nwvrqwxyaytdsfvhu[1].row;
                handleFilter(); 
            }
        } catch (error) {
            alert('데이터 로드 실패');
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }

    function handleFilter() {
        const committeeQuery = document.getElementById('committeeSelect').value;
        const textQuery = document.getElementById('unifiedSearch').value.trim().toLowerCase();
        const sortType = document.getElementById('sortSelect').value;
        
        let filtered = allMembers.filter(m => {
            const matchesCommittee = !committeeQuery || (m.CMITS && m.CMITS.includes(committeeQuery));
            const matchesText = !textQuery || 
                [m.HG_NM, m.STAFF, m.SECRETARY, m.SECRETARY2].some(val => val && val.toLowerCase().includes(textQuery));
            return matchesCommittee && matchesText;
        });

        filtered.sort((a, b) => {
            if (sortType === 'NAME_ASC') return a.HG_NM.localeCompare(b.HG_NM, 'ko');
            if (sortType === 'ROOM_ASC' || sortType === 'ROOM_DESC') {
                const roomA = parseInt((a.ASSEM_ADDR || '0').replace(/[^0-9]/g, '')) || 0;
                const roomB = parseInt((b.ASSEM_ADDR || '0').replace(/[^0-9]/g, '')) || 0;
                return sortType === 'ROOM_ASC' ? roomA - roomB : roomB - roomA;
            }
            if (sortType === 'UNITS_DESC') {
                const unitsA = (a.UNITS || '').split(',').length;
                const unitsB = (b.UNITS || '').split(',').length;
                return unitsB - unitsA;
            }
            return 0;
        });

        renderList(filtered);
    }

    function renderList(data) {
        // PC 테이블 렌더링
        const tbody = document.getElementById('memberTableBody');
        tbody.innerHTML = data.map(item => `
            <tr>
                <td class="name-link" onclick="openModal('${item.MONA_CD}')">${item.HG_NM}</td>
                <td><span class="badge">${item.POLY_NM}</span></td>
                <td>${item.ORIG_NM}</td>
                <td>${(item.CMITS || '').split(',')[0]}</td>
                <td>${item.TEL_NO || '-'}</td>
                <td>${item.STAFF || '-'}</td>
                <td><button onclick="openModal('${item.MONA_CD}')" style="padding:5px 10px; font-size:12px;">보기</button></td>
            </tr>
        `).join('');

        // 모바일 카드 렌더링
        const cardList = document.getElementById('memberCardList');
        cardList.innerHTML = data.map(item => `
            <div class="card">
                <div class="card-header">
                    <span class="card-name" onclick="openModal('${item.MONA_CD}')">${item.HG_NM}</span>
                    <span class="card-party">${item.POLY_NM}</span>
                </div>
                <div class="card-body">
                    <p><b>지역구</b> ${item.ORIG_NM}</p>
                    <p><b>위원회</b> ${(item.CMITS || '-').split(',')[0]}</p>
                    <p><b>사무실</b> ${item.ASSEM_ADDR || '-'}</p>
                    <p><b>전화</b> ${item.TEL_NO || '-'}</p>
                </div>
                <button onclick="openModal('${item.MONA_CD}')" style="margin-top:10px; padding:8px;">상세보기</button>
            </div>
        `).join('');
    }

    function openModal(monaCd) {
        const item = allMembers.find(m => m.MONA_CD === monaCd);
        if (!item) return;
        const content = `
            <tr><th>성명(한자)</th><td>${item.HG_NM} (${item.HJ_NM || '-'})</td></tr>
            <tr><th>정당 / 지역</th><td>${item.POLY_NM} / ${item.ORIG_NM}</td></tr>
            <tr><th>당선횟수</th><td>${item.UNITS}</td></tr>
            <tr><th>소속 위원회</th><td>${item.CMITS || '-'}</td></tr>
            <tr><th>사무실 호실</th><td>${item.ASSEM_ADDR || '-'}</td></tr>
            <tr><th>전화번호</th><td>${item.TEL_NO || '-'}</td></tr>
            <tr><th>이메일</th><td>${item.E_MAIL || '-'}</td></tr>
            <tr><th>보좌관</th><td>${item.STAFF || '-'}</td></tr>
            <tr><th>선임비서관</th><td>${item.SECRETARY || '-'}</td></tr>
            <tr><th>비서관</th><td>${item.SECRETARY2 || '-'}</td></tr>
        `;
        document.getElementById('detailContent').innerHTML = content;
        document.getElementById('detailModal').style.display = 'block';
        document.body.style.overflow = 'hidden'; 
    }

    function closeModal() {
        document.getElementById('detailModal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    window.onclick = (e) => { if(e.target == document.getElementById('detailModal')) closeModal(); }
</script>
</body>
</html>
