<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>제22대 국회 의원실 검색</title>
    <style>
        :root { --primary: #003478; --accent: #0056b3; --bg: #f8f9fa; --border: #dee2e6; --input-height: 38px; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); margin: 0; padding: 10px; color: #333; -webkit-tap-highlight-color: transparent; }
        
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        header { border-bottom: 2px solid var(--primary); margin-bottom: 15px; padding-bottom: 10px; }
        h1 { color: var(--primary); font-size: 18px; margin: 0; text-align: center; }

        .search-area { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; padding: 12px; background: #f1f3f5; border-radius: 8px; }
        .search-row { display: flex; flex-direction: column; gap: 8px; }
        
        select, input, .search-btn { 
            width: 100%; 
            height: var(--input-height); 
            padding: 0 12px; 
            border: 1px solid #ced4da; 
            border-radius: 6px; 
            font-size: 14px; 
            box-sizing: border-box; 
            line-height: var(--input-height);
        }
        
        .search-btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sort-row { display: flex; justify-content: flex-end; margin-bottom: 10px; }
        .sort-select { width: auto !important; height: 30px !important; padding: 0 8px !important; font-size: 12px !important; border-radius: 4px; background-color: #fff; cursor: pointer; border: 1px solid var(--border); }

        .table-wrapper { overflow-x: auto; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        
        @media (min-width: 768px) {
            .search-row { flex-direction: row; }
            #committeeSelect { flex: 3; }
            #unifiedSearch { flex: 5.5; }
            .search-btn { flex: 1.5; }
            h1 { font-size: 22px; text-align: left; }
            body { padding: 20px; }
        }

        #memberTableBody tr { 
            display: flex; flex-direction: column; margin-bottom: 15px; 
            border: 1px solid var(--border); border-radius: 8px; background: #fff; padding: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        #memberTableBody td { border: none; padding: 6px 0; display: flex; justify-content: space-between; align-items: center; white-space: normal; }
        #memberTableBody td::before { content: attr(data-label); font-weight: bold; color: #666; font-size: 12px; margin-right: 10px; }
        
        @media (min-width: 768px) {
            #memberTableBody tr { display: table-row; }
            #memberTableBody td { display: table-cell; border-bottom: 1px solid #eee; padding: 10px 12px; }
            #memberTableBody td::before { display: none; }
            thead { display: table-header-group; }
        }
        @media (max-width: 767px) { thead { display: none; } }

        .name-link { color: var(--primary); font-weight: 700; font-size: 16px; text-decoration: underline; cursor: pointer; }
        .badge { background: #eee; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        .reele-badge { background: #e7f3ff; color: #0056b3; padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 11px; margin-left: 5px; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
        .modal-content { 
            background: white; position: absolute; bottom: 0; width: 100%; 
            border-radius: 20px 20px 0 0; max-height: 85vh; overflow-y: auto; animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @media (min-width: 768px) { .modal-content { position: relative; margin: 50px auto; width: 600px; border-radius: 8px; bottom: auto; } }

        .modal-header { background: var(--primary); color: white; padding: 15px; position: sticky; top: 0; z-index: 10; display: flex; justify-content: space-between; align-items: center; }
        .detail-table { width: 100%; border-collapse: collapse; }
        .detail-table th { background: #f8f9fa; width: 35%; padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px; text-align: left; color: #666; }
        .detail-table td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; line-height: 1.5; color: #111; }
        .loading { text-align: center; padding: 30px; font-size: 16px; color: var(--primary); }

        .seminar-trigger-btn, .monitor-btn { 
            background: #2c3e50; color: white; border: none; border-radius: 6px; 
            font-weight: bold; cursor: pointer; font-size: 14px; height: 40px;
        }
        .seminar-trigger-btn { width: calc(100% - 30px); margin: 5px 15px 15px 15px; }
        
        .monitor-btn-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 15px 15px 5px 15px; }
        
        .info-section { display: none; padding: 0 15px 15px 15px; border-top: 1px solid #eee; background: #fff; }
        .info-item { padding: 12px 0; border-bottom: 1px dotted #ccc; display: block; text-decoration: none; color: inherit; }
        .info-title { color: var(--accent); font-weight: bold; cursor: pointer; text-decoration: underline; margin-bottom: 5px; font-size: 14px; }
        .info-sub { font-size: 12px; color: #777; line-height: 1.4; }
        .yt-thumb { width: 100%; aspect-ratio: 16/9; background-size: cover; background-position: center; border-radius: 8px; margin-bottom: 8px; background-color: #000; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>제22대 국회 의원실 검색</h1>
    </header>

    <div class="search-area">
        <div class="search-row">
            <select id="committeeSelect" onchange="handleFilter()">
                <option value="" selected>전체 위원회</option>
                <option value="문화체육관광위원회">문화체육관광위원회</option>
                <option value="과학기술정보방송통신위원회">과학기술정보방송통신위원회</option>
                <option value="교육위원회">교육위원회</option>
                <option value="국방위원회">국방위원회</option>
                <option value="국회운영위원회">국회운영위원회</option>
                <option value="기획재정위원회">기획재정위원회</option>
                <option value="농림축산식품해양수산위원회">농림축산식품해양수산위원회</option>
                <option value="법제사법위원회">법제사법위원회</option>
                <option value="보건복지위원회">보건복지위원회</option>
                <option value="산업통상자원중소벤처기업위원회">산업통상자원중소벤처기업위원회</option>
                <option value="여성가족위원회">여성가족위원회</option>
                <option value="예산결산특별위원회">예산결산특별위원회</option>
                <option value="외교통일위원회">외교통일위원회</option>
                <option value="윤리특별위원회">윤리특별위원회</option>
                <option value="정무위원회">정무위원회</option>
                <option value="정보위원회">정보위원회</option>
                <option value="행정안전위원회">행정안전위원회</option>
                <option value="환경노동위원회">환경노동위원회</option>
            </select>
            <input type="text" id="unifiedSearch" placeholder="의원명, 보좌진 이름" onkeyup="if(window.event.keyCode==13){handleFilter()}">
            <button class="search-btn" onclick="handleFilter()">검색</button>
        </div>
    </div>

    <div class="sort-row">
        <select id="topSort" class="sort-select" onchange="handleSort(this.value)">
            <option value="ROOM_DESC" selected>호실순</option>
            <option value="HG_NM">성명순</option>
            <option value="UNITS_DESC">다선순</option>
            <option value="NEAR_SEMINAR">행사임박순</option>
        </select>
    </div>

    <div id="loading" class="loading" style="display:none;">📡 데이터 로딩 중...</div>
    
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>성명</th>
                    <th>정당</th>
                    <th>사무실 호실</th>
                    <th>보좌관</th>
                    <th>선임비서관</th>
                </tr>
            </thead>
            <tbody id="memberTableBody"></tbody>
        </table>
    </div>

    <div class="sort-row" style="margin-top: 15px;">
        <select id="bottomSort" class="sort-select" onchange="handleSort(this.value)">
            <option value="ROOM_DESC" selected>호실순</option>
            <option value="HG_NM">성명순</option>
            <option value="UNITS_DESC">다선순</option>
            <option value="NEAR_SEMINAR">행사임박순</option>
        </select>
    </div>
</div>

<div id="detailModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <span></span>
            <strong>의원 상세 정보</strong>
            <span onclick="closeModal()" style="cursor:pointer; font-size:24px; padding: 0 10px;">&times;</span>
        </div>
        <table class="detail-table" id="detailContent"></table>

        <div class="monitor-btn-group">
            <button id="btnNaver" class="monitor-btn">네이버 뉴스</button>
            <button id="btnGoogle" class="monitor-btn">구글 뉴스</button>
            <button id="btnYoutube" class="monitor-btn">유튜브</button>
        </div>

        <div id="naverSection" class="info-section"><div id="naverList"></div></div>
        <div id="googleSection" class="info-section"><div id="googleList"></div></div>
        <div id="ytSection" class="info-section"><div id="ytList"></div></div>

        <button id="btnSeminar" class="seminar-trigger-btn">행사일정 열기</button>
        <div id="seminarSection" class="info-section">
            <div id="seminarList"></div>
        </div>

        <div style="padding: 15px; text-align: center; background: #f8f9fa;">
            <button onclick="closeModal()" style="background:#fff; color:var(--primary); border:1px solid var(--primary); width: 100px; height: 36px; font-weight: bold; border-radius: 6px; cursor: pointer;">닫기</button>
        </div>
    </div>
</div>

<script>
    const API_KEY = '4fbc27e65852496ab48087bcb355321a';
    const SEMINAR_KEY = '43212770665e4386873e766f4988a40d';
    const ENDPOINT = 'https://open.assembly.go.kr/portal/openapi/nwvrqwxyaytdsfvhu';
    const SEMINAR_ENDPOINT = 'https://open.assembly.go.kr/portal/openapi/nfcoioopazrwmjrgs';
    
    const PROXY_URL = "https://script.google.com/macros/s/AKfycbx674hDBg15__FCk1XB2HqOuxWMNB6Y2qn7b7WATT3QMCBNb4vPQzml7uZY8MJtbalU3A/exec";
    const YT_KEY = 'AIzaSyBFNFVqguQgjyy6jQWYgtTaiUn67A2DVMY';

    let allMembers = [];
    let currentFiltered = [];

    window.onload = fetchAllAssemblyData;

    async function fetchAllAssemblyData() {
        const loader = document.getElementById('loading');
        loader.style.display = 'block';
        try {
            const response = await fetch(`${ENDPOINT}?KEY=${API_KEY}&Type=json&pIndex=1&pSize=500`);
            const data = await response.json();
            if (data.nwvrqwxyaytdsfvhu) {
                allMembers = data.nwvrqwxyaytdsfvhu[1].row;
                currentFiltered = [...allMembers];
                handleSort('ROOM_DESC'); 
            }
        } catch (error) { 
            console.error(error);
        } finally { 
            loader.style.display = 'none'; 
        }
    }

    function handleFilter() {
        const committee = document.getElementById('committeeSelect').value;
        const text = document.getElementById('unifiedSearch').value.trim().toLowerCase();
        
        currentFiltered = allMembers.filter(m => {
            const mComm = !committee || (m.CMITS && m.CMITS.includes(committee));
            const mText = !text || [m.HG_NM, m.STAFF, m.SECRETARY, m.SECRETARY2].some(v => v && v.toLowerCase().includes(text));
            return mComm && mText;
        });
        
        const currentSort = document.getElementById('topSort').value;
        handleSort(currentSort);
    }

    async function handleSort(criteria) {
        document.getElementById('topSort').value = criteria;
        document.getElementById('bottomSort').value = criteria;

        if (criteria === 'NEAR_SEMINAR') {
            await sortBySeminar();
            return;
        }

        currentFiltered.sort((a, b) => {
            if (criteria === 'HG_NM') return (a.HG_NM || '').localeCompare(b.HG_NM || '', 'ko');
            if (criteria === 'ROOM_DESC') {
                const roomA = parseInt((a.ASSEM_ADDR || '0').replace(/[^0-9]/g, '')) || 0;
                const roomB = parseInt((b.ASSEM_ADDR || '0').replace(/[^0-9]/g, '')) || 0;
                return roomB - roomA;
            }
            if (criteria === 'UNITS_DESC') {
                const unitA = (a.UNITS || '').split(',').length;
                const unitB = (b.UNITS || '').split(',').length;
                return unitB - unitA;
            }
            return 0;
        });
        renderTable(currentFiltered);
    }

    async function sortBySeminar() {
        const loader = document.getElementById('loading');
        loader.style.display = 'block';
        loader.innerText = "행사 일정 분석 중...";

        try {
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const seminarPromises = currentFiltered.map(async (m) => {
                try {
                    const url = `${SEMINAR_ENDPOINT}?KEY=${SEMINAR_KEY}&Type=json&pIndex=1&pSize=10&NAME=${encodeURIComponent(m.HG_NM)}`;
                    const res = await fetch(url);
                    const data = await res.json();
                    
                    if (data.nfcoioopazrwmjrgs) {
                        const rows = data.nfcoioopazrwmjrgs[1].row;
                        // 오늘을 포함하여 미래의 가장 가까운 행사 날짜 찾기
                        const validSeminars = rows
                            .map(r => new Date(r.SDATE))
                            .filter(d => {
                                d.setHours(0,0,0,0);
                                return d >= today;
                            })
                            .sort((a, b) => a - b);
                        
                        return { ...m, nextSeminar: validSeminars.length > 0 ? validSeminars[0] : null };
                    }
                    return { ...m, nextSeminar: null };
                } catch {
                    return { ...m, nextSeminar: null };
                }
            });

            const enrichedMembers = await Promise.all(seminarPromises);

            enrichedMembers.sort((a, b) => {
                // 둘 다 일정이 없으면 순서 유지
                if (!a.nextSeminar && !b.nextSeminar) return 0;
                // a만 없으면 뒤로
                if (!a.nextSeminar) return 1;
                // b만 없으면 앞으로
                if (!b.nextSeminar) return -1;
                // 둘 다 있으면 오늘에 더 가까운(날짜가 빠른) 순서대로
                return a.nextSeminar - b.nextSeminar;
            });

            currentFiltered = enrichedMembers;
            renderTable(currentFiltered);
        } catch (e) {
            console.error(e);
        } finally {
            loader.style.display = 'none';
            loader.innerText = "📡 데이터 로딩 중...";
        }
    }

    function renderTable(data) {
        const container = document.getElementById('memberTableBody');
        if(data.length === 0) {
            container.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:40px;">결과가 없습니다.</td></tr>';
            return;
        }

        container.innerHTML = data.map(item => {
            const reele = item.REELE_GNB_NM || '';
            return `
                <tr>
                    <td data-label="성명">
                        <div>
                            <span class="name-link" onclick="openModal('${item.MONA_CD}')">${item.HG_NM || '-'}</span>
                            ${reele ? `<span class="reele-badge">${reele}</span>` : ''}
                        </div>
                    </td>
                    <td data-label="정당"><span class="badge">${item.POLY_NM || '-'}</span></td>
                    <td data-label="사무실 호실">${item.ASSEM_ADDR || '-'}</td>
                    <td data-label="보좌관" style="font-size:12px; color:#666;">${item.STAFF || '-'}</td>
                    <td data-label="선임비서관" style="font-size:12px; color:#666;">${item.SECRETARY || '-'}</td>
                </tr>
            `;
        }).join('');
    }

    function openModal(monaCd) {
        const item = allMembers.find(m => m.MONA_CD === monaCd);
        if(!item) return;

        ['seminar', 'naver', 'google', 'yt'].forEach(s => {
            document.getElementById(`${s}Section`).style.display = 'none';
            document.getElementById(`${s}List`).innerHTML = '';
        });
        document.getElementById('btnSeminar').innerText = '행사일정 열기';

        const unitInfo = item.UNITS ? `${item.REELE_GNB_NM || ''} (${item.UNITS})` : (item.REELE_GNB_NM || '-');
        const emailLink = item.E_MAIL ? `<a href="mailto:${item.E_MAIL}" style="color:var(--accent); text-decoration:underline;">${item.E_MAIL}</a>` : '-';

        const fields = [
            ["한자성명", item.HJ_NM], ["정당", item.POLY_NM], ["선거구", item.ORIG_NM],
            ["당선 정보", unitInfo], ["소속 위원회", item.CMITS], ["전화번호", item.TEL_NO],
            ["사무실 호실", item.ASSEM_ADDR], ["이메일", emailLink], 
            ["홈페이지", item.HOMEPAGE ? `<a href="${item.HOMEPAGE}" target="_blank" style="color:var(--accent)">바로가기</a>` : '-'],
            ["보좌관", item.STAFF], ["선임비서관", item.SECRETARY], ["비서관", item.SECRETARY2]
        ];
        
        document.getElementById('detailContent').innerHTML = fields.map(f => `<tr><th>${f[0]}</th><td>${f[1] || '-'}</td></tr>`).join('');
        
        const query = `"${item.POLY_NM}" "${item.HG_NM}"`;

        document.getElementById('btnSeminar').onclick = () => toggleAccordion('seminar', item.HG_NM);
        document.getElementById('btnNaver').onclick = () => toggleAccordion('naver', query);
        document.getElementById('btnGoogle').onclick = () => toggleAccordion('google', query);
        document.getElementById('btnYoutube').onclick = () => toggleAccordion('yt', query);
        
        document.getElementById('detailModal').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    async function toggleAccordion(targetType, searchValue) {
        const types = ['seminar', 'naver', 'google', 'yt'];
        const targetSection = document.getElementById(`${targetType}Section`);
        const isAlreadyOpen = targetSection.style.display === 'block';

        types.forEach(t => {
            document.getElementById(`${t}Section`).style.display = 'none';
            if(t === 'seminar') document.getElementById('btnSeminar').innerText = '행사일정 열기';
        });

        if (!isAlreadyOpen) {
            targetSection.style.display = 'block';
            if(targetType === 'seminar') {
                document.getElementById('btnSeminar').innerText = '행사일정 닫기';
                fetchSeminars(searchValue);
            } else {
                fetchMonitorData(targetType, searchValue);
            }
        }
    }

    async function fetchMonitorData(type, q) {
        const listDiv = document.getElementById(`${type}List`);
        listDiv.innerHTML = '<p style="font-size:13px; color:#666; padding:10px;">데이터 로딩 중...</p>';

        try {
            if (type === 'naver') {
                const api = `https://openapi.naver.com/v1/search/news.json?query=${encodeURIComponent(q)}&display=10&sort=date`;
                const res = await fetch(`${PROXY_URL}?url=${encodeURIComponent(api)}`);
                const data = await res.json();
                listDiv.innerHTML = (data.items || []).map(i => `
                    <a href="${i.link}" target="_blank" class="info-item">
                        <div class="info-title">${i.title.replace(/<[^>]*>?/gm, '')}</div>
                        <div class="info-sub">${new Date(i.pubDate).toLocaleDateString()}</div>
                    </a>
                `).join('') || '결과 없음';
            } 
            else if (type === 'google') {
                const url = `https://news.google.com/rss/search?q=${encodeURIComponent(q)}&hl=ko&gl=KR&ceid=KR:ko`;
                const res = await fetch(`${PROXY_URL}?url=${encodeURIComponent(url)}`);
                const text = await res.text();
                const xml = new DOMParser().parseFromString(text, "text/xml");
                const items = Array.from(xml.querySelectorAll("item")).slice(0, 10);
                listDiv.innerHTML = items.map(i => `
                    <a href="${i.querySelector("link").textContent}" target="_blank" class="info-item">
                        <div class="info-title">${i.querySelector("title").textContent}</div>
                        <div class="info-sub">${i.querySelector("source")?.textContent || ''}</div>
                    </a>
                `).join('') || '결과 없음';
            }
            else if (type === 'yt') {
                const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q)}&maxResults=5&order=date&type=video&key=${YT_KEY}`;
                const res = await fetch(url);
                const data = await res.json();
                listDiv.innerHTML = (data.items || []).map(v => `
                    <a href="https://www.youtube.com/watch?v=${v.id.videoId}" target="_blank" class="info-item">
                        <div class="yt-thumb" style="background-image:url('${v.snippet.thumbnails.medium.url}')"></div>
                        <div class="info-title" style="font-size:13px;">${v.snippet.title}</div>
                    </a>
                `).join('') || '결과 없음';
            }
        } catch (e) { listDiv.innerHTML = '데이터 로드 실패'; }
    }

    async function fetchSeminars(memberName) {
        const listDiv = document.getElementById('seminarList');
        listDiv.innerHTML = '<p style="font-size:13px; color:#666;">조회 중...</p>';
        try {
            const url = `${SEMINAR_ENDPOINT}?KEY=${SEMINAR_KEY}&Type=json&pIndex=1&pSize=50&NAME=${encodeURIComponent(memberName)}`;
            const res = await fetch(url);
            const data = await res.json();
            if(data.nfcoioopazrwmjrgs) {
                const rows = data.nfcoioopazrwmjrgs[1].row;
                const today = new Date(); today.setHours(0,0,0,0);
                listDiv.innerHTML = rows.map(s => {
                    const sDate = new Date(s.SDATE); sDate.setHours(0,0,0,0);
                    const isUp = sDate >= today;
                    return `<div class="info-item">
                        <div class="info-title" onclick="if('${s.IMGLINK}') window.open('${s.IMGLINK}')">${s.TITLE}</div>
                        <div class="info-sub" style="${isUp ? 'color:#ff0000; font-weight:bold;' : ''}">일시: ${s.SDATE} | 장소: ${s.LOCATION || '-'}</div>
                    </div>`;
                }).join('');
            } else { listDiv.innerHTML = '<p style="font-size:13px; color:#999; padding:10px 0;">행사 일정이 없습니다.</p>'; }
        } catch (e) { listDiv.innerHTML = '오류 발생'; }
    }

    function closeModal() { document.getElementById('detailModal').style.display = 'none'; document.body.style.overflow = 'auto'; }
    window.onclick = (e) => { if (e.target == document.getElementById('detailModal')) closeModal(); }
</script>
